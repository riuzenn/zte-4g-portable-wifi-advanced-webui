<div class="form-body">
	<form id="frmUSSD22">
		<div id="USSD_send_div">
			<div class="form-title" trans='unclock_sim'></div>
			<div class="content">
				<div class="row-fluid">
          <label class="span4 side-right" trans="P_unlock"></label>
					<div class="span8">
            <input type="text" name="unclock_sim" data-bind="value: unclock_sim" id="unclock_sim" class="required" maxlength="32" />
          </div>
				</div>
				<div class="form-buttons">
          <input id="unclock_sim_apply" data-bind="click: save" type="submit" class="btn-1 " trans='apply' />
        </div>
				<!-- <div><label class="colorRed" trans='changesim_cannot_modify'></label></div> -->
			</div>
			<div class="form-title">密码计算工具</div>
			<div class="content">
				<div class="row-fluid">
          <label class="span4 side-right">计算解锁密码</label>
					<div class="span8">
            <input type="text" id="zte-imei" placeholder="请输入IMEI后6位数字" maxlength="6" />
            <div id="zte-result"></div>
          </div>
				</div>
				<div class="form-buttons">
          <input id="zte-pwd-btn" onclick="zteCalcPassword()" type="button" class="btn-1 " value="计算" />
        </div>
			</div>
		</div>
	</form>
</div>
<script>
	function zteUnlockPassword(imei) {
			return (imei[5] * 7 % 10) + "" +
						 (imei[4] * 6 % 10) + 
						 (imei[3] * 5 % 10) + 
						 (imei[2] * 4 % 10) + 
						 (imei[1] * 3 % 10) + 
						 (imei[0] * 2 % 10);
	}
	const imeiInput = document.getElementById('zte-imei');
	const resultDiv = document.getElementById('zte-result');
	function zteCalcPassword() {
		let imei = imeiInput.value.trim();
		resultDiv.replaceChildren();
		if (imei.length !== 6 || !/^\d{6}$/.test(imei)) {
			resultDiv.textContent = '请输入有效的 6 位数字！';
			imeiInput.focus();return;
		}
		let ztepassword = zteUnlockPassword(imei);
		resultDiv.textContent = `解锁密码：${ztepassword}`;
		$("#unclock_sim").val(ztepassword).change();
  }
	function FetchAndFillimei() {
		$.ajax({
			url: '/goform/goform_get_cmd_process',
			type: 'GET',
			data: {
				isTest: 'false',
				cmd: 'imei',
				multi_data: 1, 
			},
			dataType: 'json',
			cache: false,
			success: (res) => {
				if (res && res.imei && res.imei.length >= 6) {imeiInput.value = res.imei.slice(-6);zteCalcPassword();}}
		});
	}
	FetchAndFillimei();
</script>
