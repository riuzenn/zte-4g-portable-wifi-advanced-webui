    </div>

                </div>
            </div>
            <div data-bind="visible: showMssid()">
                <div class="row-fluid modify_link">
                    <label class="span4 side-right" trans="network_name_ssid1">
                    </label>
                    <span class="span8">
                        <span data-bind="text: ssid">
                        </span>
                        <a href="#wifi_basic" trans="modify">
                        </a>
                    </span>
                </div>
                <div class="row-fluid">
                    <label class="span4 side-right" trans="max_access_num_ssid1">
                    </label>
                    <label class="span8" data-bind="text: max_access_num">
                    </label>
                </div>
                <div class="row-fluid">
                    <label class="span4 side-right" trans="network_name_ssid2">
                    </label>
                    <label class="span8" data-bind="text: m_ssid">
                    </label>
                </div>
                <div class="row-fluid">
                    <label class="span4 side-right" trans="max_access_num_ssid2">

                    </label>

            </div>
            <div class="row-fluid modify_link">
                <label class="span4 side-right" trans="wifi_range">
                </label>

                    <span data-bind="attr:{trans: wifiRange}">
                    </span>
                    <a href="#sleep_mode" trans="modify">
                    </a>
                </span>

        </div>
        <div class="row-fluid" data-bind="visible: showDomain">

            </label>

        <div class="row-fluid" data-bind="visible: showIpv4WanIpAddr">

        </div>

        <div class="row-fluid hide">

            </label>

        </div>

            </label>
            <label class="span8">
                ZTE F30A Pro
            </label>
        </div>
    </div>
</div>
<script>
(async () => {
    const bandid = document.getElementById("band");
    const QoSid = document.getElementById("QoS");
    const band = async () => {
        const res = await evalcmd('at "AT+ZBAND?"');
        if (!res) {bandid.textContent = "获取失败";return;}
        const match = res.match(/^_(\d+),(\d+)_$/m);
        if (!match) {bandid.textContent = "无有效驻留频段";return;}        
        if (match[1] === "3") {bandid.textContent = `B${match[2]}`;}
        else {bandid.textContent = `${match[1]},${match[2]}`;}
    };       
    const QoS = async () => {
        const res = await evalcmd('at "AT+CGEQOSRDP=1"');
        if (!res) {QoSid.textContent = "获取失败";return;}
        const match = res.match(/^_1,(\d),"","","(\d+),(\d+)"_$/m);
        if (!match) {QoSid.textContent = "— —";return;}
        QoSid.textContent = `QCI ${match[1]} / ↓ ${(match[2] / 1000).toFixed(2)}Mbps / ↑ ${(match[3] / 1000).toFixed(2)}Mbps`;};
    Promise.all([band(),QoS()]).catch(e => {showinbox("设备信息加载异常", e);});
})();
</script>
